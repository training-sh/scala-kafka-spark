version: "3.8"

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:${CP_TAG:-6.2.0}
    container_name: cp-zookeeper
    hostname: zookeeper
    restart: unless-stopped
    networks: [kafkaspark-net]
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zk-data2:/var/lib/zookeeper/data
      - zk-txn-logs2:/var/lib/zookeeper/log

  broker:
    image: confluentinc/cp-kafka:${CP_TAG:-6.2.0}
    container_name: cp-kafka
    hostname: broker
    restart: unless-stopped
    depends_on: [zookeeper]
    networks: [kafkaspark-net]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      # Single plaintext listener; advertised for in-network clients (Flink, Jupyter, etc.)
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:9092
      # Single-replica safety knobs for a 1-node cluster:
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data2:/var/lib/kafka/data
      - ./secret:/secret:ro

  # (Optional) CLI helper container: exec into it to run kafka-* tools
  kafka-tools:
    image: confluentinc/cp-kafka:${CP_TAG:-6.2.0}
    container_name: kafka-tools
    networks: [kafkaspark-net]
    depends_on: [broker]
    entrypoint: ["bash","-lc","sleep infinity"]
    volumes:
      - kafka-data2:/var/lib/kafka/data
      - ./secret:/secret:ro

  schema-registry:
    image: confluentinc/cp-schema-registry:${CP_TAG:-6.2.0}
    container_name: cp-schema-registry
    hostname: schema-registry
    restart: unless-stopped
    depends_on:
      - broker
    networks: [kafkaspark-net]
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://broker:9092
    
networks:
  kafkaspark-net: 
    name: kafkaspark-net

volumes:
  zk-data2:
  zk-txn-logs2:
  kafka-data2:

 
