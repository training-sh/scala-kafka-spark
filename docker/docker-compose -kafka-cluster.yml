version: "3.8"

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:${CP_TAG:-6.2.0}
    container_name: cp-zookeeper
    hostname: zookeeper
    restart: unless-stopped
    networks: [kafkaspark-net]
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zk-data2:/var/lib/zookeeper/data
      - zk-txn-logs2:/var/lib/zookeeper/log

  broker:
    image: confluentinc/cp-kafka:${CP_TAG:-6.2.0}
    container_name: cp-kafka
    hostname: broker
    restart: unless-stopped
    depends_on: [zookeeper]
    networks: [kafkaspark-net]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      # Single plaintext listener; advertised for in-network clients (Flink, Jupyter, etc.)
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:9092
      # Single-replica safety knobs for a 1-node cluster:
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data2:/var/lib/kafka/data
      - ./secret:/secret:ro




  broker2:
    image: confluentinc/cp-kafka:${CP_TAG:-6.2.0}
    container_name: cp-kafka2
    hostname: broker2
    restart: unless-stopped
    depends_on: [zookeeper]
    networks: [kafkaspark-net]
    ports:
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      # Single plaintext listener; advertised for in-network clients (Flink, Jupyter, etc.)
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker2:9093
      # Single-replica safety knobs for a 1-node cluster:
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data3:/var/lib/kafka/data
      - ./secret:/secret:ro

  broker3:
    image: confluentinc/cp-kafka:${CP_TAG:-6.2.0}
    container_name: cp-kafka3
    hostname: broker3
    restart: unless-stopped
    depends_on: [zookeeper]
    networks: [kafkaspark-net]
    ports:
      - "9094:9094"
    environment:
      KAFKA_BROKER_ID: 3
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      # Single plaintext listener; advertised for in-network clients (Flink, Jupyter, etc.)
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker3:9094
      # Single-replica safety knobs for a 1-node cluster:
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data4:/var/lib/kafka/data
      - ./secret:/secret:ro

  broker4:
    image: confluentinc/cp-kafka:${CP_TAG:-6.2.0}
    container_name: cp-kafka4
    hostname: broker4
    restart: unless-stopped
    depends_on: [zookeeper]
    networks: [kafkaspark-net]
    ports:
      - "9095:9095"
    environment:
      KAFKA_BROKER_ID: 4
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      # Single plaintext listener; advertised for in-network clients (Flink, Jupyter, etc.)
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9095
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker4:9095
      # Single-replica safety knobs for a 1-node cluster:
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data5:/var/lib/kafka/data
      - ./secret:/secret:ro

  # (Optional) CLI helper container: exec into it to run kafka-* tools
  kafka-tools:
    image: confluentinc/cp-kafka:${CP_TAG:-6.2.0}
    container_name: kafka-tools
    networks: [kafkaspark-net]
    depends_on: [broker]
    entrypoint: ["bash","-lc","sleep infinity"]
    volumes:
      - kafka-data2:/var/lib/kafka/data
      - ./secret:/secret:ro
    

  schema-registry:
    image: confluentinc/cp-schema-registry:${CP_TAG:-6.2.0}
    container_name: cp-schema-registry
    hostname: schema-registry
    restart: unless-stopped
    depends_on:
      - broker
    networks: [kafkaspark-net]
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://broker:9092


  minio:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z
    container_name: minio
    restart: unless-stopped
    networks: [kafkaspark-net]
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
      MINIO_SKIP_CLIENT: "true"   # disable interactive client in logs
      MINIO_PROMPT: "off"         # disable license acknowledgment prompt
    command: server /data --console-address ":9001"
    ports: ["9000:9000", "9001:9001"]
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-05-21T01-59-54Z
    container_name: minio-init
    depends_on: [minio]
    networks: [kafkaspark-net]
    restart: "no"
    entrypoint: >
      sh -c "
      until (mc alias set local http://minio:9000 minio minio12345) 2>/dev/null; do
        echo 'waiting for minio...'; sleep 2;
      done &&
      mc mb --ignore-existing local/checkpoints &&
      mc mb --ignore-existing local/datalake &&
      mc mb --ignore-existing local/warehouse &&
      mc mb --ignore-existing local/libs &&
      mc anonymous set download local/warehouse &&
      echo 'MinIO buckets ready.'"

networks:
  kafkaspark-net: 
    name: kafkaspark-net

volumes:
  zk-data2:
  zk-txn-logs2:
  kafka-data2:
  kafka-data3:
  kafka-data4:
  kafka-data5:
  minio-data:
 